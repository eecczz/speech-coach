<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      document.documentElement.dataset.theme = savedTheme || 'light';
    </script>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/brand.css" />
  </head>
  <body>
    <main class="container app-shell page-center">
      <section class="screen home-start">
        <div class="topbar">
          <div class="brand">
            <div class="brand-badge">S</div>
            <div class="brand-copy">
              <strong>SpeakUp</strong>
              <span>말하기 연습 공간</span>
            </div>
          </div>
          <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
        </div>

        <div class="home-copy">
          <h1>오늘은 어떤 연습을 해볼까요?</h1>
          <p>발표, 면접, 스피치, 리허설까지 편하게 말해보는 시간을 시작해요.</p>
        </div>

        <div class="actions home-action">
          <a class="btn btn-primary" href="create-project.html">연습 시작</a>
        </div>

        <div class="quiet-tags" aria-label="코칭 방향">
          <span>시선</span>
          <span>속도</span>
          <span>구조</span>
          <span>자신감</span>
        </div>
      </section>
    </main>

    <script>
      const themeToggle = document.querySelector('[data-theme-toggle]');

      function syncThemeToggle() {
        const theme = document.documentElement.dataset.theme || 'light';
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
      }

      themeToggle.addEventListener('click', () => {
        const nextTheme = (document.documentElement.dataset.theme || 'light') === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem('speakup-theme', nextTheme);
        syncThemeToggle();
      });

      syncThemeToggle();
    </script>
  </body>
</html>
