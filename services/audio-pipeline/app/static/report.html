<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 코칭 리포트 - SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      document.documentElement.dataset.theme = savedTheme || 'light';
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <script type="module" crossorigin src="/assets/report-BLpyuqw5.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/store-C_yxxovN.js">
    <link rel="stylesheet" crossorigin href="/assets/brand-BL1KTx5O.css">
  </head>
  <body>
    <main class="app-shell report-shell">
      <div class="topbar app-nav">
        <a class="brand" href="index.html" aria-label="SpeakUp 홈">
          <div class="brand-badge">S</div>
          <div class="brand-copy">
            <strong id="report-title">AI 코칭 리포트</strong>
            <span id="report-subtitle">Step 3 코칭</span>
          </div>
        </a>
        <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
      </div>

      <section class="progress-steps" aria-label="진행 단계">
        <span>1 준비</span>
        <span>2 연습</span>
        <span class="is-current">3 코칭</span>
      </section>

      <section class="report-hero">
        <div>
          <span class="eyebrow">Session Report</span>
          <h1 id="report-heading">AI 코칭 리포트</h1>
          <p id="report-focus-line">저장된 연습 결과를 불러오는 중입니다.</p>
        </div>
        <div class="report-actions">
          <button type="button" class="btn btn-ghost" id="print-link" title="영상은 PDF에 포함되지 않고, 주요 순간·총평·전사 확인 표현·측정 지표가 저장됩니다.">PDF로 저장</button>
          <a class="btn btn-ghost" id="retry-link" href="practice.html">다시 연습</a>
          <a class="btn btn-primary" href="dashboard.html">대시보드</a>
        </div>
      </section>

      <div id="report-status" class="report-status">리포트 로딩 중...</div>
      <section id="review" class="report-review" hidden></section>
    </main>

  </body>
</html>
