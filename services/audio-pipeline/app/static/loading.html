<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>분석 중 — SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = savedTheme || (systemDark ? 'dark' : 'light');
    </script>
    <link rel="stylesheet" crossorigin href="/assets/style-B3damzLU.css">
  </head>
  <body>
    <main class="container app-shell page-center">
      <section class="screen single-column" style="max-width: 620px; width: 100%;">
        <div class="topbar">
          <div class="brand">
            <div class="brand-badge">S</div>
            <div class="brand-copy">
              <strong>SpeakUp</strong>
              <span>준비 중</span>
            </div>
          </div>
          <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
        </div>

        <div class="hero-copy">
          <h1>분석 중</h1>
          <p>잠시만 기다려주세요.</p>
        </div>

        <div id="steps" class="loading-stack"></div>

        <div class="loading-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>

    <script>
      const themeToggle = document.querySelector('[data-theme-toggle]');
      const params = new URLSearchParams(location.search);
      const project = params.get('project') || '오늘의 리허설';
      const goal = params.get('goal') || '시선 처리';

      function syncThemeToggle() {
        const theme = document.documentElement.dataset.theme || 'light';
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
      }

      themeToggle.addEventListener('click', () => {
        const nextTheme = (document.documentElement.dataset.theme || 'light') === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem('speakup-theme', nextTheme);
        syncThemeToggle();
      });

      const steps = [
        '시선 흐름을 확인하는 중…',
        '발표 습관을 분석하는 중…',
        '피드백을 정리하는 중…'
      ];

      const stepsEl = document.getElementById('steps');
      const items = steps.map((message, index) => {
        const row = document.createElement('div');
        row.className = 'loading-step';
        row.innerHTML = `<div class="step-dot"></div><strong>${message}</strong>`;
        stepsEl.appendChild(row);
        setTimeout(() => {
          row.classList.add('is-visible');
          if (index === 0) row.classList.add('is-current');
        }, 200 + index * 1500);
        return row;
      });

      setTimeout(() => {
        items[0].classList.remove('is-current');
        items[1].classList.add('is-current');
      }, 1900);

      setTimeout(() => {
        items[1].classList.remove('is-current');
        items[2].classList.add('is-current');
      }, 3400);

      setTimeout(() => {
        const next = new URL('report.html', location.href);
        next.searchParams.set('project', project);
        next.searchParams.set('goal', goal);
        location.href = next.toString();
      }, 6200);

      syncThemeToggle();
    </script>
  </body>
</html>
