<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연습 준비 - SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      document.documentElement.dataset.theme = savedTheme || 'light';
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <script type="module" crossorigin src="/assets/createProject-DedSQUgo.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/session-store-D6T-j3PH.js">
    <link rel="modulepreload" crossorigin href="/assets/project-store-62FOwKO7.js">
    <link rel="stylesheet" crossorigin href="/assets/brand-CyYJ1Jet.css">
  </head>
  <body>
    <main class="container app-shell">
      <section class="project-shell">
        <aside class="screen project-sidebar project-sidebar-compact">
          <div class="project-sidebar-head">
            <a class="brand" href="index.html" aria-label="SpeakUp 홈">
              <div class="brand-badge">S</div>
              <div class="brand-copy">
                <strong>SpeakUp</strong>
              </div>
            </a>
            <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
          </div>

          <button id="project-create-toggle" type="button" class="btn project-create-inline">+ 새 프로젝트</button>
          <div id="project-list" class="project-list" aria-label="프로젝트 목록"></div>
        </aside>

        <section class="screen project-main project-main-simple">
          <section class="progress-steps" aria-label="진행 단계">
            <span class="is-current">1 상황 입력</span>
            <span>2 포커스 선택</span>
            <span>3 연습</span>
          </section>

          <div class="page-heading">
            <h1>오늘 어떤 말하기 연습을 할까요?</h1>
            <p id="project-context"></p>
          </div>

          <div class="field">
            <label for="practice-situation">연습 상황</label>
            <input id="practice-situation" type="text" />
          </div>

          <div class="actions vertical">
            <button id="btn-next" class="btn btn-primary">다음</button>
          </div>
        </section>
      </section>
    </main>

    <div id="project-modal" class="modal-backdrop" hidden>
      <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
        <div class="page-heading">
          <h2 id="project-modal-title">새 프로젝트 만들기</h2>
        </div>
        <form id="project-create-form" class="project-modal-form">
          <input id="project-create-input" type="text" placeholder="프로젝트 이름 입력" />
          <div class="modal-actions">
            <button id="project-cancel" type="button" class="btn btn-ghost">취소</button>
            <button type="submit" class="btn btn-primary">생성</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
