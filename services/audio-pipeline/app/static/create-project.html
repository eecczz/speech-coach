<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상황 설정 - SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      document.documentElement.dataset.theme = savedTheme || 'light';
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link rel="stylesheet" crossorigin href="/assets/brand-Cxc74oTK.css">
  </head>
  <body>
    <main class="container app-shell">
      <div class="topbar app-nav">
        <a class="brand" href="index.html" aria-label="SpeakUp 홈">
          <div class="brand-badge">S</div>
          <div class="brand-copy">
            <strong>SpeakUp</strong>
            <span>상황 설정</span>
          </div>
        </a>
        <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
      </div>

      <section class="progress-steps" aria-label="진행 단계">
        <span class="is-current">1 준비</span>
        <span>2 연습</span>
        <span>3 코칭</span>
      </section>

      <section class="setup-layout">
        <section class="screen setup-main">
          <div class="page-heading">
            <h1>오늘 어떤 말하기를 연습할까요?</h1>
            <p>상황과 집중하고 싶은 부분을 정하면 SpeakUp이 맞춤 코칭을 준비해요.</p>
          </div>

          <div class="field">
            <label for="project-name">세션 이름</label>
            <input id="project-name" placeholder="예: 삼성 최종 면접 준비" type="text" />
          </div>

          <div class="field">
            <label for="presentation-type">연습 상황</label>
            <select id="presentation-type" class="sr-select">
              <option value="presentation">발표</option>
              <option value="interview">면접</option>
              <option value="negotiation">협상</option>
              <option value="persuasion">설득</option>
              <option value="daily">일상 대화</option>
              <option value="phone">전화</option>
              <option value="online">온라인</option>
              <option value="free">자유 연습</option>
            </select>
            <div class="scenario-grid" data-scenario-grid>
              <button type="button" class="scenario-card is-selected" data-value="presentation">
                <i class="ti ti-presentation"></i><strong>발표</strong><span>청중 앞에서 말하는 흐름</span>
              </button>
              <button type="button" class="scenario-card" data-value="interview">
                <i class="ti ti-briefcase"></i><strong>면접</strong><span>질문에 답하는 자신감</span>
              </button>
              <button type="button" class="scenario-card" data-value="negotiation">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 12 6.5 7.5a2.12 2.12 0 0 0-3 3l4.9 4.9a2.12 2.12 0 0 0 3 0" />
                  <path d="m13 12 4.5-4.5a2.12 2.12 0 1 1 3 3l-4.9 4.9a2.12 2.12 0 0 1-3 0" />
                  <path d="m8 11 2 2" />
                  <path d="m14 11 2 2" />
                </svg><strong>협상</strong><span>근거와 톤의 균형</span>
              </button>
              <button type="button" class="scenario-card" data-value="persuasion">
                <i class="ti ti-target"></i><strong>설득</strong><span>핵심 메시지 전달</span>
              </button>
              <button type="button" class="scenario-card" data-value="daily">
                <i class="ti ti-message-circle"></i><strong>일상 대화</strong><span>편안한 대화 습관</span>
              </button>
              <button type="button" class="scenario-card" data-value="phone">
                <i class="ti ti-phone"></i><strong>전화</strong><span>목소리만으로 전달하기</span>
              </button>
              <button type="button" class="scenario-card" data-value="online">
                <i class="ti ti-device-laptop"></i><strong>온라인</strong><span>화면 너머의 집중감</span>
              </button>
              <button type="button" class="scenario-card" data-value="free">
                <i class="ti ti-sparkles"></i><strong>자유 연습</strong><span>오늘 떠오른 말 연습</span>
              </button>
            </div>
          </div>

          <div class="field">
            <strong>집중 포커스</strong>
            <div class="chip-group" id="focus-chip-group">
              <label class="chip"><input type="checkbox" value="말 속도" /><span class="chip-check">✓</span>말 속도</label>
              <label class="chip"><input type="checkbox" value="시선 처리" /><span class="chip-check">✓</span>시선 처리</label>
              <label class="chip"><input type="checkbox" value="필러 표현" /><span class="chip-check">✓</span>필러 표현</label>
              <label class="chip"><input type="checkbox" value="논리 흐름" /><span class="chip-check">✓</span>논리 흐름</label>
              <label class="chip"><input type="checkbox" value="목소리 톤" /><span class="chip-check">✓</span>목소리 톤</label>
              <label class="chip"><input type="checkbox" value="자신감" /><span class="chip-check">✓</span>자신감</label>
            </div>
          </div>

          <div class="actions vertical">
            <button id="btn-go" class="btn btn-primary">연습 시작하기</button>
          </div>
        </section>

        <aside class="side-panel">
          <section class="card session-summary">
            <h2>세션 요약</h2>
            <dl>
              <div><dt>이름</dt><dd data-summary-name>—</dd></div>
              <div><dt>상황</dt><dd data-summary-type>발표</dd></div>
              <div><dt>포커스</dt><dd data-summary-focus>—</dd></div>
              <div><dt>예상 시간</dt><dd>5분</dd></div>
            </dl>
          </section>
          <section class="card tip-card">
            <h2>오늘의 팁</h2>
            <p data-tip>처음 10초는 천천히 시작해보세요. 시작 속도가 전체 리듬을 만들어줘요.</p>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const themeToggle = document.querySelector('[data-theme-toggle]');
      const focusChipGroup = document.getElementById('focus-chip-group');
      const projectName = document.getElementById('project-name');
      const typeSelect = document.getElementById('presentation-type');
      const summaryName = document.querySelector('[data-summary-name]');
      const summaryType = document.querySelector('[data-summary-type]');
      const summaryFocus = document.querySelector('[data-summary-focus]');
      const tip = document.querySelector('[data-tip]');
      const scenarioLabel = {
        presentation: '발표',
        interview: '면접',
        negotiation: '협상',
        persuasion: '설득',
        daily: '일상 대화',
        phone: '전화',
        online: '온라인',
        free: '자유 연습',
      };
      const tips = {
        presentation: '첫 문장은 조금 느리게 시작해보세요. 청중이 리듬을 따라오기 쉬워져요.',
        interview: '답변은 결론을 먼저 말하고, 이유를 짧게 붙이면 안정적으로 들려요.',
        negotiation: '상대가 들을 수 있는 속도로 근거를 하나씩 놓아보세요.',
        persuasion: '핵심 메시지를 한 문장으로 반복하면 설득력이 좋아져요.',
        daily: '문장 끝을 조금 부드럽게 내려보세요. 대화가 더 편안해져요.',
        phone: '표정이 목소리에 묻어나요. 살짝 웃고 말해보세요.',
        online: '카메라를 보는 순간을 의식적으로 조금 늘려보세요.',
        free: '오늘 고치고 싶은 습관 하나만 정해도 충분해요.',
      };

      function syncThemeToggle() {
        const theme = document.documentElement.dataset.theme || 'light';
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
      }

      themeToggle.addEventListener('click', () => {
        const nextTheme = (document.documentElement.dataset.theme || 'light') === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem('speakup-theme', nextTheme);
        syncThemeToggle();
      });

      function getSelectedFocus() {
        return Array.from(focusChipGroup.querySelectorAll('input:checked')).map((input) => input.value);
      }

      function renderSelectedFocus() {
        focusChipGroup.querySelectorAll('.chip').forEach((label) => {
          const input = label.querySelector('input');
          label.classList.toggle('is-selected', input.checked);
        });
        updateSummary();
      }

      function updateSummary() {
        const selectedType = typeSelect.value;
        const focus = getSelectedFocus();
        summaryName.textContent = projectName.value.trim() || '—';
        summaryType.textContent = scenarioLabel[selectedType] || '자유 연습';
        summaryFocus.textContent = focus.length ? focus.join(', ') : '—';
        tip.textContent = tips[selectedType] || tips.free;
      }

      document.querySelectorAll('[data-scenario-grid] .scenario-card').forEach((card) => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.scenario-card').forEach((el) => el.classList.remove('is-selected'));
          card.classList.add('is-selected');
          typeSelect.value = card.dataset.value;
          updateSummary();
        });
      });

      projectName.addEventListener('input', updateSummary);
      focusChipGroup.addEventListener('change', renderSelectedFocus);

      document.getElementById('btn-go').addEventListener('click', () => {
        const name = encodeURIComponent(projectName.value.trim() || '오늘의 말하기 연습');
        const type = encodeURIComponent(typeSelect.value || 'free');
        const goal = encodeURIComponent(getSelectedFocus().join(', ') || '말 속도');
        location.href = `practice.html?project=${name}&type=${type}&goal=${goal}`;
      });

      syncThemeToggle();
      renderSelectedFocus();
      updateSummary();
    </script>
  </body>
</html>
