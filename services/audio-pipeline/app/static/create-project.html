<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>새 연습 - SpeakUp</title>
    <script>
      const savedTheme = localStorage.getItem('speakup-theme');
      document.documentElement.dataset.theme = savedTheme || 'light';
    </script>
    <link rel="stylesheet" crossorigin href="/assets/brand-C5xyIzSu.css">
  </head>
  <body>
    <main class="container app-shell narrow-app">
      <div class="topbar">
        <div class="brand">
          <div class="brand-badge">S</div>
          <div class="brand-copy">
            <strong>SpeakUp</strong>
            <span>새 연습</span>
          </div>
        </div>
        <button type="button" class="btn theme-toggle mode-toggle" data-theme-toggle aria-label="테마 전환">🌙</button>
      </div>

      <section class="progress-steps" aria-label="진행 단계">
        <span class="is-current">1 준비</span>
        <span>2 연습</span>
        <span>3 코칭</span>
      </section>

      <section class="screen single-column">
        <div class="hero-copy compact-copy">
          <h1>오늘의 리허설을 준비해볼까요?</h1>
          <p>연습 이름과 상황, 집중하고 싶은 말하기 습관을 가볍게 정해주세요.</p>
        </div>

        <div class="bento-form">
          <div class="field bento-wide">
            <label for="project-name">연습 이름</label>
            <input id="project-name" placeholder="예: 면접 답변 연습" type="text" />
          </div>

          <div class="field">
            <label for="presentation-type">연습 상황</label>
            <select id="presentation-type">
              <option value="presentation">발표</option>
              <option value="interview">면접</option>
              <option value="speech">스피치</option>
              <option value="rehearsal">리허설</option>
              <option value="habit">말하기 습관</option>
            </select>
          </div>

          <div class="field bento-wide">
            <strong>연습 포커스</strong>
            <div class="chip-group" id="focus-chip-group">
              <label class="chip" data-tone="blue"><input type="checkbox" value="시선" /><span class="chip-check">✓</span>시선</label>
              <label class="chip" data-tone="mint"><input type="checkbox" value="속도" /><span class="chip-check">✓</span>속도</label>
              <label class="chip" data-tone="yellow"><input type="checkbox" value="구조" /><span class="chip-check">✓</span>구조</label>
              <label class="chip" data-tone="pink"><input type="checkbox" value="자신감" /><span class="chip-check">✓</span>자신감</label>
            </div>
          </div>
        </div>

        <div class="actions vertical">
          <button id="btn-go" class="btn btn-primary">편하게 시작하기</button>
        </div>
      </section>
    </main>

    <script>
      const themeToggle = document.querySelector('[data-theme-toggle]');
      const focusChipGroup = document.getElementById('focus-chip-group');
      const projectName = document.getElementById('project-name');

      function syncThemeToggle() {
        const theme = document.documentElement.dataset.theme || 'light';
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
      }

      themeToggle.addEventListener('click', () => {
        const nextTheme = (document.documentElement.dataset.theme || 'light') === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem('speakup-theme', nextTheme);
        syncThemeToggle();
      });

      function getSelectedFocus() {
        return Array.from(focusChipGroup.querySelectorAll('input:checked')).map((input) => input.value);
      }

      function renderSelectedFocus() {
        const labels = focusChipGroup.querySelectorAll('.chip');
        labels.forEach((label) => {
          const input = label.querySelector('input');
          label.classList.toggle('is-selected', input.checked);
        });
      }

      focusChipGroup.addEventListener('change', renderSelectedFocus);

      document.getElementById('btn-go').addEventListener('click', () => {
        const name = encodeURIComponent(projectName.value.trim() || '오늘의 말하기 연습');
        const type = encodeURIComponent(document.getElementById('presentation-type').value || 'rehearsal');
        const goal = encodeURIComponent(getSelectedFocus().join(', ') || '시선');
        location.href = `practice.html?project=${name}&type=${type}&goal=${goal}`;
      });

      syncThemeToggle();
      renderSelectedFocus();
    </script>
  </body>
</html>
